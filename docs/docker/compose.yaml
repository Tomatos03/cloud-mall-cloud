services:
  mysql:
    container_name: cm-mysql
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cm_mall
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql/all/cm_mall.sql:/docker-entrypoint-initdb.d/cm_mall.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: cm-redis
    image: redis:7
    ports:
      - "6379:6379"

  nacos:
    container_name: cm-nacos
    image: nacos/nacos-server:v2.5.0
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
      - "9848:9848"

  nacos-init:
    container_name: cm-nacos-init
    image: curlimages/curl:latest
    depends_on:
      nacos:
        condition: service_started
    volumes:
      - ../nacos/config:/config:ro
      - ./sh/sync-nacos-config.sh:/sync.sh:ro
    entrypoint: ["/bin/sh", "/sync.sh", "nacos"]
    restart: "no"

  nginx:
    container_name: cm-nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    # Linux: host-gateway 自动解析为宿主机 IP（通常 172.17.0.1）
    # macOS/Windows Docker Desktop: 内置支持，此行可保留无副作用
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql-data:
