services:
  mysql:
    container_name: cm-mysql
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cm_mall
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql/all/cm_mall.sql:/docker-entrypoint-initdb.d/cm_mall.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: cm-redis
    image: redis:7
    ports:
      - "6379:6379"

  nacos:
    container_name: cm-nacos
    image: nacos/nacos-server:v3.0.3
    environment:
      MODE: standalone
      NACOS_AUTH_TOKEN: "TR21j0whe7UlQPISxv+TiuU3M5CS8HPKXRCuxNlbQrw="
      NACOS_AUTH_IDENTITY_KEY: nacos
      NACOS_AUTH_IDENTITY_VALUE: nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "8080:8080"

  nacos-init:
    container_name: cm-nacos-init
    image: curlimages/curl:latest
    depends_on:
      nacos:
        condition: service_started
    volumes:
      - ../nacos/config:/config:ro
      - ./sh/sync-nacos-config.sh:/sync.sh:ro
    entrypoint: ["/bin/sh", "/sync.sh", "nacos"]
    restart: "no"

  nginx:
    container_name: cm-nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    # Linux: host-gateway 自动解析为宿主机 IP（通常 172.17.0.1）
    # macOS/Windows Docker Desktop: 内置支持，此行可保留无副作用
    extra_hosts:
      - "host.docker.internal:host-gateway"

  elasticsearch:
    container_name: cm-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  elasticsearch-data:
