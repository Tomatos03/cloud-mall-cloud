services:
  mysql:
    container_name: cm-mysql
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cm_mall
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/sql/all/cm_mall.sql:/docker-entrypoint-initdb.d/cm_mall.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: cm-redis
    image: redis:7
    ports:
      - "6379:6379"

  nacos:
    container_name: cm-nacos
    image: nacos/nacos-server:v2.5.0
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
      - "9848:9848"

volumes:
  mysql-data:
