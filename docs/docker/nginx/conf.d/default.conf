server {
    listen 80;
    charset utf-8;

    # ======================================================
    # API 请求 → Spring Cloud Gateway（运行在宿主机 8079 端口）
    #
    # 匹配所有微服务 API 路径。这些路由定义在 Gateway 的 Nacos 配置中：
    #   /auth/**, /user/**, /coupon/**, /goods/**
    #   /category/**, /banner/**, /comment/**, /favorite/**
    #   /unit/**, /seckill/**, /order/**, /cart/**
    #
    # 【本地开发】Gateway 在你的 IntelliJ 中运行，通过 host.docker.internal 可达
    # 【生产/容器化】改成 proxy_pass http://gateway:8079;
    # ======================================================
    location ~ ^/(auth|user|coupon|goods|category|banner|comment|favorite|unit|seckill|order|cart)/ {
        proxy_pass http://host.docker.internal:8079;

        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ======================================================
    # 前端请求 → Vue Dev Server（运行在宿主机 5173 端口）
    #
    # 【本地开发】在 Vue 项目目录下执行 npm run dev，
    # Vite 开发服务器会监听 5173 端口并提供热更新。
    # ======================================================
    location / {
        proxy_pass http://host.docker.internal:5173;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Vite 热更新 (HMR) 依赖 WebSocket，必须开启升级
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
