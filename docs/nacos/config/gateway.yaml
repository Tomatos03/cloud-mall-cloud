server:
  port: 8079

auth:
  whitelist:
    - /auth/sessions
    - /auth/users

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=0

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/user/**
              filters:
                - StripPrefix=0

            - id: coupon-service
              uri: lb://coupon-service
              predicates:
                - Path=/coupon/**
              filters:
                - StripPrefix=0

            - id: goods-service
              uri: lb://goods-service
              predicates:
                - Path=/goods/**,/category/**,/banner/**,/comment/**,/favorite/**,/unit/**
              filters:
                - StripPrefix=0

            - id: seckill-service
              uri: lb://seckill-service
              predicates:
                - Path=/seckill/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/order/**,/cart/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - "*"
            allowedHeaders:
              - "*"
